<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Minecraft{% endblock %} — Dashboard</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Press+Start+2P&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <style>
    :root {
      --bg:           #17181c;
      --nav-bg:       #0e0f12;
      --surface:      #1f2128;
      --surface-var:  #282b34;
      --surface-high: #31353f;
      --primary:      #5aab28;
      --primary-lit:  #6ec234;
      --on-primary:   #ffffff;
      --outline-var:  #25282f;
      --outline:      #383c47;
      --text:         #f2f2f4;
      --text-dim:     #7e8494;
      --text-muted:   #4e5260;
      --error:        #e05252;
      --warning:      #d98c35;
      --radius-sm:    6px;
      --radius-md:    12px;
      --radius-lg:    18px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Nunito', sans-serif; min-height: 100vh; }

    /* ── Nav ── */
    nav {
      background: var(--nav-bg);
      border-bottom: 1px solid var(--outline-var);
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,.5);
    }
    .nav-inner {
      max-width: 1140px; margin: 0 auto; padding: 0 28px;
      height: 56px; display: flex; align-items: stretch; gap: 2px;
    }
    .nav-brand {
      font-family: 'Press Start 2P', monospace; font-size: 9px;
      color: var(--primary); display: flex; align-items: center;
      padding-right: 20px; margin-right: 8px;
      border-right: 1px solid var(--outline-var); letter-spacing: 0;
    }
    .nav-link {
      display: flex; align-items: center; gap: 7px;
      padding: 0 16px;
      color: var(--text-dim); text-decoration: none;
      font-size: 14px; font-weight: 600; transition: all .15s;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }
    .nav-link:hover { color: var(--text); border-bottom-color: var(--outline); }
    .nav-link.active { color: var(--primary); border-bottom-color: var(--primary); }
    .nav-link .material-icons-round { font-size: 17px; }
    .nav-spacer { flex: 1; }

    /* ── Layout ── */
    main { max-width: 1140px; margin: 0 auto; padding: 32px 28px; }

    /* ── Cards ── */
    .card {
      background: var(--surface); border: 1px solid var(--outline-var);
      border-radius: var(--radius-md); padding: 22px;
    }
    .card-title {
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .1em;
      color: var(--text-muted); margin-bottom: 16px;
    }

    /* ── Stats ── */
    .stat-label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 5px; }
    .stat-value { font-size: 20px; font-weight: 700; }

    /* ── Progress ── */
    .progress-track { height: 4px; background: var(--surface-high); border-radius: 2px; overflow: hidden; margin-top: 12px; }
    .progress-bar   { height: 100%; border-radius: 2px; transition: width .6s ease; }
    .bar-green  { background: var(--primary); }
    .bar-yellow { background: var(--warning); }
    .bar-red    { background: var(--error); }
    .c-green  { color: var(--primary); }
    .c-yellow { color: var(--warning); }
    .c-red    { color: var(--error); }

    /* ── Status dot ── */
    .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
    .dot-green { background: var(--primary); box-shadow: 0 0 7px var(--primary); animation: blink 2.5s infinite; }
    .dot-red   { background: var(--error); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.35} }

    /* ── Chips ── */
    .chip { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 100px; font-size: 12px; font-weight: 700; border: 1px solid; }
    .chip-green { border-color: var(--primary); color: var(--primary); background: rgba(88,166,41,.12); }
    .chip-red   { border-color: var(--error);   color: var(--error);   background: rgba(224,82,82,.12); }
    .chip .material-icons-round { font-size: 12px; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 22px; border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 700; cursor: pointer;
      transition: all .15s; border: none;
      font-family: 'Nunito', sans-serif; text-decoration: none;
      letter-spacing: .01em;
    }
    .btn-primary { background: var(--primary); color: var(--on-primary); }
    .btn-primary:hover { background: var(--primary-lit); box-shadow: 0 4px 14px rgba(88,166,41,.3); }
    .btn-outline { background: transparent; color: var(--primary); border: 1px solid var(--primary); }
    .btn-outline:hover { background: rgba(88,166,41,.08); }
    .btn .material-icons-round { font-size: 18px; }

    /* ── Form fields ── */
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; }
    .field label { font-size: 11px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: .08em; }
    .field input {
      background: var(--surface-var); border: 1px solid var(--outline-var);
      border-radius: var(--radius-sm); color: var(--text);
      padding: 11px 14px; font-size: 14px; font-family: 'Nunito', sans-serif; font-weight: 500;
      transition: border-color .15s; outline: none;
    }
    .field input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(88,166,41,.18); }
    .field .hint { font-size: 11px; color: var(--text-muted); }

    /* ── Alert ── */
    .alert { padding: 11px 15px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 9px; margin-bottom: 20px; }
    .alert .material-icons-round { font-size: 18px; }
    .alert-success { background: rgba(88,166,41,.12); border: 1px solid rgba(88,166,41,.28); color: var(--primary); }
    .alert-error   { background: rgba(224,82,82,.12);  border: 1px solid rgba(224,82,82,.28);  color: var(--error); }

    /* ── Grid ── */
    .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 18px; }
    @media(max-width:768px) { .grid-3,.grid-4 { grid-template-columns: 1fr 1fr; } main { padding: 20px 16px; } }
    @media(max-width:480px) { .grid-3,.grid-4 { grid-template-columns: 1fr; } }

    /* ── Page header ── */
    .page-header { margin-bottom: 24px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .page-header h1 { font-size: 22px; font-weight: 800; display: flex; align-items: center; gap: 9px; }
    .page-header h1 .material-icons-round { font-size: 24px; color: var(--primary); }
    .page-header .sub { font-size: 13px; color: var(--text-muted); margin-left: auto; font-weight: 600; }

    /* ── Log viewer ── */
    .log-viewer {
      background: #0d0e10; border: 1px solid var(--outline-var);
      border-radius: var(--radius-md); padding: 18px 22px;
      font-family: 'Roboto Mono', monospace; font-size: 12px;
      line-height: 1.8; overflow-y: auto; max-height: 70vh;
    }
    .log-viewer .l-warn    { color: var(--warning); }
    .log-viewer .l-error   { color: var(--error); }
    .log-viewer .l-info    { color: #5b9bd5; }
    .log-viewer .l-default { color: #6e7a6e; }

    /* ── Player card ── */
    .player-card {
      background: var(--surface); border: 1px solid var(--outline-var);
      border-radius: var(--radius-md); padding: 20px 14px;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      transition: all .18s; cursor: default;
    }
    .player-card:hover {
      border-color: var(--primary);
      box-shadow: 0 0 0 1px var(--primary), 0 6px 20px rgba(88,166,41,.15);
      transform: translateY(-3px);
    }
    .player-card img { image-rendering: pixelated; border-radius: 5px; }
    .player-name { font-size: 13px; font-weight: 700; text-align: center; }

    /* ── Misc ── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: var(--surface); }
    ::-webkit-scrollbar-thumb { background: var(--outline); border-radius: 3px; }
    .material-icons-round { vertical-align: middle; user-select: none; }
    .mb-4 { margin-bottom: 16px; }
    .mb-6 { margin-bottom: 24px; }
    .flex { display: flex; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <span class="nav-brand">⛏ MC</span>
    <a href="/"        class="nav-link {% if request.url.path == '/' %}active{% endif %}">
      <span class="material-icons-round">dashboard</span> Dashboard
    </a>
    <a href="/players" class="nav-link {% if request.url.path == '/players' %}active{% endif %}">
      <span class="material-icons-round">group</span> Joueurs
    </a>
    <a href="/history" class="nav-link {% if request.url.path == '/history' %}active{% endif %}">
      <span class="material-icons-round">history</span> Historique
    </a>
    <a href="/logs"    class="nav-link {% if request.url.path == '/logs' %}active{% endif %}">
      <span class="material-icons-round">receipt_long</span> Journaux
    </a>
    <a href="/stats"   class="nav-link {% if request.url.path == '/stats' %}active{% endif %}">
      <span class="material-icons-round">bar_chart</span> Stats
    </a>
    <div class="nav-spacer"></div>
    <a href="/console"  class="nav-link {% if request.url.path == '/console' %}active{% endif %}">
      <span class="material-icons-round">terminal</span> Console
    </a>
    <a href="/settings" class="nav-link {% if '/settings' in request.url.path or request.url.path == '/login' %}active{% endif %}">
      <span class="material-icons-round">settings</span> Config
    </a>
  </div>
</nav>

<main>
  {% block content %}{% endblock %}
</main>

<footer style="text-align:center;padding:18px 0 24px;font-size:11px;color:var(--text-muted);font-weight:600;letter-spacing:.06em">
  v{{ version }}
</footer>

</body>
</html>
